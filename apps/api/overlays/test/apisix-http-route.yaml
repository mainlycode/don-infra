apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: apisix-http-route
spec:
  parentRefs:
    - name: public-gateway
      namespace: istio-gateway
      sectionName: https
  hostnames:
    - set-in-overlay
  rules:
    - backendRefs:
        - name: don-api-apisix
          kind: Service
          port: 9080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: apisix-admin-http-route
spec:
  parentRefs:
    - name: public-gateway
      namespace: istio-gateway
      sectionName: https
  hostnames:
    - set-in-overlay
  rules:
    - backendRefs:
        - name: don-api-apisix-admin
          kind: Service
          port: 9180

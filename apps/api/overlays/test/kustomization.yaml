apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: tn-don-api
namePrefix: don-api-

commonLabels:
  app: api

patches:
  - target:
      kind: HelmRelease
      name: discourse
    patch: |
      - op: replace
        path: /spec/values/replicaCount
        value: 1
      - op: replace
        path: /spec/values/host
        value: api.don.apps.digilab.network
      - op: replace
        path: /spec/values/ingress/hostname
        value: api.don.apps.digilab.network
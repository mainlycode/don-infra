apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - register-site-http-route.yaml
  - don-schema-register-http-route.yaml
  - apisix-http-route.yaml
  - apisix.yaml
  - register-site.yaml
  - tools-secret.yaml
  - api-register-secret.yaml
  - api-register-db.yaml
  - piwik-secret.yaml
  - opa-auth-config.yaml
namespace: tn-don-api-test
namePrefix: don-api-
images:
  - name: don-api-register
    newName: ghcr.io/developer-overheid-nl/don-api-register
    newTag: 18d4568adbfc3aaa42b518e72b3e0d27a6d67f59
  - name: don-register-site
    newName: ghcr.io/developer-overheid-nl/don-register-site
    newTag: 921b19abe85b58c29d1d42fb7f54eed33ee9cf2d
  - name: don-tools-api
    newName: ghcr.io/developer-overheid-nl/don-api-tools
    newTag: 5e9d8483911830902681f84e105e9032db650bc4
  - name: don-schema-register
    newName: ghcr.io/developer-overheid-nl/don-schema-register
    newTag: e7e7b664183df1f82c0cea0f83ad8310cd7687ab
patches:
  - target:
      kind: HelmRelease
      name: apisix
    patch: |
      - op: replace
        path: /spec/values/replicaCount
        value: 1
      - op: replace
        path: /spec/values/ingress/enabled
        value: false
      - op: replace
        path: /spec/values/apisix/admin/ingress/enabled
        value: false
  - target:
      kind: HTTPRoute
      name: apisix-http-route
    patch: |
      - op: replace
        path: /spec/hostnames/0
        value: api.don.projects.digilab.network
  - target:
      kind: HTTPRoute
      name: apisix-admin-http-route
    patch: |
      - op: replace
        path: /spec/hostnames/0
        value: api-admin.don.projects.digilab.network
  - target:
      kind: HTTPRoute
      name: register-site-http-route
    patch: |
      - op: replace
        path: /spec/hostnames/0
        value: api-register.don.projects.digilab.network
  - target:
      kind: HTTPRoute
      name: don-schema-register-http-route
    patch: |
      - op: replace
        path: /spec/hostnames/0
        value: schemas.don.projects.digilab.network

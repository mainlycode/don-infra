apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: tn-don-api
namePrefix: don-api-

commonLabels:
  app: api

patches:
  - target:
      kind: HelmRelease
      name: discourse
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: api.don.apps.digilab.network
      - op: replace
        path: /spec/tls/0/hosts/0
        value: api.don.apps.digilab.network
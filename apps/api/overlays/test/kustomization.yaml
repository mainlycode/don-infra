apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - apisix.yaml
  - apisix-keycloak-plugin.yaml
  - register-site.yaml
  - tools-secret.yaml
  - api-register-secret.yaml
  - api-register-db.yaml
  - piwik-secret.yaml

namespace: tn-don-api
namePrefix: don-api-

images:
  - name: don-api-register
    newName: ghcr.io/developer-overheid-nl/don-api-register
    newTag: 329b4eaaa93fdc7a683be8c1871400c54211ce81
  - name: don-register-site
    newName: ghcr.io/developer-overheid-nl/don-register-site
    newTag: 807df0e2d74a25a897e82442c6766303df98bb94
  - name: don-tools-api
    newName: ghcr.io/developer-overheid-nl/don-api-tools
    newTag: 5e9d8483911830902681f84e105e9032db650bc4
  - name: don-schema-register
    newName: ghcr.io/developer-overheid-nl/don-schema-register
    newTag: bf6f03d370b31026f763b4ad06aebb7b712f6e8b

patches:
  - target:
      kind: HelmRelease
      name: apisix
    patch: |
      - op: replace
        path: /spec/values/replicaCount
        value: 1
      - op: replace
        path: /spec/values/ingress/hosts/0/host
        value: api.don.apps.digilab.network
      - op: replace
        path: /spec/values/ingress/tls/0/hosts/0
        value: api.don.apps.digilab.network
      - op: replace
        path: /spec/values/apisix/admin/ingress/hosts/0/host
        value: api-admin.don.apps.digilab.network
      - op: replace
        path: /spec/values/apisix/admin/ingress/tls/0/hosts/0
        value: api-admin.don.apps.digilab.network
  - target:
        kind: Ingress
        name: register-site-ing
    patch: |    
      - op: replace
        path: /spec/rules/0/host
        value: api-register.don.apps.digilab.network
      - op: replace
        path: /spec/tls/0/hosts/0
        value: api-register.don.apps.digilab.network
  - target:
        kind: Ingress
        name: don-schema-register-ing
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: schemas.don.apps.digilab.network
      - op: replace
        path: /spec/tls/0/hosts/0
        value: schemas.don.apps.digilab.network

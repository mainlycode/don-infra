apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - apisix.yaml
  - api-db.yaml
  - apisix-keycloak-plugin.yaml
  - api-register.yaml
  - tools-secret.yaml

namespace: tn-don-api
namePrefix: don-api-

images:
  - name: don-api-register
    newName: ghcr.io/developer-overheid-nl/don-api-register
    newTag: a01db21423f54014b99c8f68a4f46321cac7beb9
  - name: don-register-site
    newName: ghcr.io/developer-overheid-nl/don-register-site
    newTag: e2722f5e6c7a4ef497411484d62bb944faabf05b
  - name: don-tools-api
    newName: ghcr.io/developer-overheid-nl/don-api-tools
    newTag: 3f410660448999bc9310ac5dbfd9bc5d875c17e5

patches:
  - target:
      kind: HelmRelease
      name: apisix
    patch: |
      - op: replace
        path: /spec/values/replicaCount
        value: 1
      - op: replace
        path: /spec/values/ingress/hosts/0/host
        value: api.don.apps.digilab.network
      - op: replace
        path: /spec/values/ingress/tls/0/hosts/0
        value: api.don.apps.digilab.network
      - op: replace
        path: /spec/values/apisix/admin/ingress/hosts/0/host
        value: api-admin.don.apps.digilab.network
      - op: replace
        path: /spec/values/apisix/admin/ingress/tls/0/hosts/0
        value: api-admin.don.apps.digilab.network
  - target:
        kind: Ingress
        name: register-site-ing
    patch: |    
      - op: replace
        path: /spec/rules/0/host
        value: api-register.don.apps.digilab.network
      - op: replace
        path: /spec/tls/0/hosts/0
        value: api-register.don.apps.digilab.network

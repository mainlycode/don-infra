apiVersion: v1
kind: ConfigMap
metadata:
  name: apisix-ratelimit-plugins
data:
  rate-limit-by-keycloak-attribute.lua: |
    local core = require("apisix.core")
    local http = require("resty.http")
    local cjson = require("cjson.safe")
    
    local plugin_name = "rate-limit-by-keycloak-attribute"
    
    local schema = {
        type = "object",
        properties = {
            token_url = { type = "string" },
            admin_api_url = { type = "string" },
            client_id = { type = "string" },
            client_secret = { type = "string" },
            header = { type = "string", default = "x-api-key" },
            cache_ttl = { type = "integer", default = 300 },
        },
        required = { "token_url", "admin_api_url", "client_id", "client_secret" }
    }
    
    local plugin = {
        version = 0.2,
        priority = 1001,
        name = plugin_name,
        schema = schema
    }
    
    local cache = core.lrucache.new({ ttl = 300, count = 1000 })
    
    local function get_admin_token(conf)
        local httpc = http.new()
        local res, err = httpc:request_uri(conf.token_url, {
            method = "POST",
            body = "grant_type=client_credentials&client_id=" .. conf.client_id ..
              "&client_secret=" .. conf.client_secret,
            headers = {
                ["Content-Type"] = "application/x-www-form-urlencoded"
            },
            ssl_verify = false,
        })
        
        if not res or res.status ~= 200 then
            core.log.error("Failed to obtain admin token: ", err or (res and res.body))
            return nil
        end
        
        local data = cjson.decode(res.body)
        core.log.info("Admin token response: ", res.body)
        return data and data.access_token
    end
    
    local function get_client_rate_limit(conf, client_id, token)
        local url = conf.admin_api_url .. "/" .. client_id
        local httpc = http.new()
        local res, err = httpc:request_uri(url, {
            method = "GET",
            headers = {
                ["Authorization"] = "Bearer " .. token,
                ["Content-Type"] = "application/json"
            },
            ssl_verify = false,
        })
        
        core.log.info("Requesting rate limit from: ", url)
        if not res or res.status ~= 200 then
            core.log.warn("Failed to fetch client from Keycloak: ", err or (res and res.body))
            return nil
        end
        
        local client = cjson.decode(res.body)
        core.log.info("Keycloak client attributes: ", cjson.encode(client and client.attributes))
        if not client or not client.attributes or not client.attributes["rate-limit"] then
            core.log.warn("No rate-limit attribute found for client_id: ", client_id)
            return nil
        end
        
        return tonumber(client.attributes["rate-limit"])
    end
    
    function plugin.check_schema(conf)
        return core.schema.check(schema, conf)
    end
    
    function plugin.access(conf, ctx)
        local client_id = core.request.header(ctx, conf.header)
        if not client_id then
            local claims = ctx.var.jwt_claims
            client_id = claims and claims["client_id"]
        end
        
        core.log.info("client_id resolved: ", client_id)
        if not client_id then
            return core.response.exit(400, { message = "Missing client_id" })
        end
        
        local token = cache("admin-token", conf.cache_ttl, get_admin_token, conf)
        core.log.info("Admin token (cached): ", token and "<present>" or "<missing>")
        if not token then
            return core.response.exit(500, { message = "Unable to obtain admin token" })
        end
        
        local cache_key = "ratelimit:" .. client_id
        local rate_limit = cache(cache_key, conf.cache_ttl, get_client_rate_limit, conf, client_id, token)
        core.log.warn("[PLUGIN] Incoming request for client_id: ", client_id)
        core.log.warn("[PLUGIN] Cache key: ", cache_key)
        core.log.warn("[PLUGIN] Rate limit resolved: ", rate_limit)
        if not rate_limit or rate_limit <= 0 then
            core.log.warn("[PLUGIN] No rate limit found for client_id: ", client_id)
            return core.response.exit(403, { message = "Rate limit not configured for this client" })
        end
        
        local plugin_loader = require("apisix.plugin")
        local limit_count = plugin_loader.get("limit-count")
        
        if not limit_count or type(limit_count.access) ~= "function" then
            core.log.error("❌ Failed to load 'limit-count' plugin or its 'access' function.")
            return core.response.exit(500, { message = "Limit-count plugin not available" })
        end
        
        ctx.var.jwt_claim_client_id = client_id
        
        local limit_conf = {
            count = 10,
            time_window = 60,
            key_type = "var",
            key = "remote_addr",
            rejected_code = 429,
            policy = "local",
        }
        
        core.log.warn("[PLUGIN] limit_conf: ", cjson.encode(limit_conf))
        core.log.warn("[PLUGIN] ctx.var.jwt_claim_client_id: ", ctx.var.jwt_claim_client_id)
        
        core.log.warn("VOOR limiter: ", client_id, limit_conf)
        local ok, err = limit_count.access(limit_conf, ctx)
        core.log.warn("NA limiter: ", ok, err)
        if not ok then
            core.log.warn("[PLUGIN] Rate limit REJECTED for client_id: ", client_id, "; reason: ", err)
            return core.response.exit(429, { message = err })
        else
            core.log.warn("[PLUGIN] Rate limit OK for client_id: ", client_id)
        end
    end
    
    plugin.schema = schema
    return plugin

apiVersion: v1
kind: ConfigMap
metadata:
  name: apisix-ratelimit-plugins
data:
  rate-limit-by-keycloak-attribute.lua: |
    local core = require("apisix.core")
    local http = require("resty.http")
    local cjson = require("cjson.safe")
    local limit_count = require("apisix.plugins.limit-count")
    
    local plugin_name = "rate-limit-by-keycloak-attribute"
    local plugin = {
        version = 0.2,
        priority = 1001,
        name = plugin_name,
    }
    
    function plugin.check_schema(conf)
        if not conf.keycloak_token_endpoint or not conf.keycloak_admin_client_id
                or not conf.keycloak_admin_client_secret or not conf.keycloak_realm then
            return false, "Missing required configuration for Keycloak integration"
        end
        return true
    end
    
    local function get_admin_access_token(conf)
        local httpc = http.new()
        local res, err = httpc:request_uri(conf.keycloak_token_endpoint, {
            method = "POST",
            body = core.utils.table_to_str({
                grant_type = "client_credentials",
                client_id = conf.keycloak_admin_client_id,
                client_secret = conf.keycloak_admin_client_secret
            }),
            headers = {
                ["Content-Type"] = "application/x-www-form-urlencoded",
            },
        })
        
        if not res then
            return nil, "failed to request token: " .. (err or "unknown")
        end
        
        local data = cjson.decode(res.body)
        return data and data.access_token, "failed to parse token response"
    end
    
    local function get_client_rate_limit(conf, client_id, access_token)
        local httpc = http.new()
        local url = conf.keycloak_base_url .. "/admin/realms/" .. conf.keycloak_realm .. "/clients/" .. client_id
        local res, err = httpc:request_uri(url, {
            method = "GET",
            headers = {
                ["Authorization"] = "Bearer " .. access_token,
                ["Content-Type"] = "application/json",
            }
        })
        
        if not res then
            return nil, "failed to request client: " .. (err or "unknown")
        end
        
        local client = cjson.decode(res.body)
        if not client or not client.attributes or not client.attributes["rate-limit"] then
            return nil, "client or rate-limit attribute not found"
        end
        
        return tonumber(client.attributes["rate-limit"])
    end
    
    function plugin.access(conf, ctx)
        local client_id = ctx.var.http_x_api_key
        if not client_id then
            local claims = ctx.var.jwt_claims
            client_id = claims and claims["client_id"]
        end
        
        if not client_id then
            return core.response.exit(400, { message = "Missing client_id" })
        end
        
        local access_token, err = get_admin_access_token(conf)
        if not access_token then
            return core.response.exit(500, { message = "Keycloak token error: " .. err })
        end
        
        local rate_limit, err = get_client_rate_limit(conf, client_id, access_token)
        if not rate_limit or rate_limit <= 0 then
            rate_limit = conf.default or 10
        end
        
        ctx.var.jwt_claim_client_id = client_id
        
        local limit_conf = {
            count = rate_limit,
            time_window = 60,
            key_type = "var",
            key = "jwt_claim_client_id",
            rejected_code = 429,
            policy = "local",
        }
        
        local ok, err = limit_count.access(limit_conf, ctx)
        if not ok then
            return core.response.exit(429, { message = err })
        end
    end
    
    return plugin

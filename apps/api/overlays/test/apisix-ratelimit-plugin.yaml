apiVersion: v1
kind: ConfigMap
metadata:
  name: apisix-ratelimit-plugins
data:
  rate-limit-by-keycloak-attribute.lua: |
    local core = require("apisix.core")
    local http = require("resty.http")
    local cjson = require("cjson.safe")
    local limit_count = require("apisix.plugins.limit-count.init")
    local plugin_name = "rate-limit-by-keycloak-attribute"
    
    local schema = {
        type = "object",
        properties = {
            token_url = { type = "string" },
            admin_api_url = { type = "string" },
            client_id = { type = "string" },
            client_secret = { type = "string" },
            header = { type = "string", default = "x-api-key" },
            cache_ttl = { type = "integer", default = 300 },
        },
        required = { "token_url", "admin_api_url", "client_id", "client_secret" }
    }
    
    local plugin = {
        version = 0.2,
        priority = -1,
        name = plugin_name,
        schema = schema
    }
    
    local cache = core.lrucache.new({ ttl = 300, count = 1000 })
    
    local function get_admin_token(conf)
        local httpc = http.new()
        local res, err = httpc:request_uri(conf.token_url, {
            method = "POST",
            body = "grant_type=client_credentials&client_id=" .. conf.client_id ..
                    "&client_secret=" .. conf.client_secret,
            headers = {
                ["Content-Type"] = "application/x-www-form-urlencoded"
            },
            ssl_verify = false,
        })
        
        if not res or res.status ~= 200 then
            core.log.error("Failed to obtain admin token: ", err or (res and res.body))
            return nil
        end
        
        local data = cjson.decode(res.body)
        core.log.info("Admin token response: ", res.body)
        return data and data.access_token
    end
    
    local function get_all_clients(conf, admin_token)
        local httpc = http.new()
        local url = conf.admin_api_url
        local res, err = httpc:request_uri(url, {
            method = "GET",
            headers = {
                ["Authorization"] = "Bearer " .. admin_token,
                ["Content-Type"] = "application/json"
            },
            ssl_verify = false,
        })
        if not res or res.status ~= 200 then
            core.log.error("Failed to fetch client list from Keycloak: ", err or (res and res.body))
            return nil
        end
        local list = cjson.decode(res.body)
        return list
    end
    
    local function resolve_client_uuid(clients, client_id)
        for _, c in ipairs(clients) do
            if c.clientId == client_id then
                return c.id
            end
        end
        return nil
    end
    
    local function get_client_rate_limit(conf, client_id, token)
        local url = conf.admin_api_url .. "/" .. client_id
        local httpc = http.new()
        local res, err = httpc:request_uri(url, {
            method = "GET",
            headers = {
                ["Authorization"] = "Bearer " .. token,
                ["Content-Type"] = "application/json"
            },
            ssl_verify = false,
        })
        
        core.log.info("Requesting rate limit from: ", url)
        if not res or res.status ~= 200 then
            core.log.warn("Failed to fetch client from Keycloak: ", err or (res and res.body))
            return 100
        end
        
        local client = cjson.decode(res.body)
        core.log.info("Keycloak client attributes: ", cjson.encode(client and client.attributes))
        if not client or not client.attributes or not client.attributes["rate-limit-profile"] then
            core.log.warn("No rate-limit-profile attribute found for client_id: ", client_id)
            return nil
        end
        local rate_limit = 100
        if client.attributes["rate-limit-profile"] == "untrusted" then
            rate_limit = 50
        end
        if client.attributes["rate-limit-profile"] == "trusted" then
            rate_limit = 500
        end
        if client.attributes["rate-limit-profile"] == "admin" then
            rate_limit = 2500
        end
        
        return rate_limit
    end
    
    function plugin.check_schema(conf)
        return core.schema.check(schema, conf)
    end
    
    local function apply_ratelimit(client_uuid, conf, ctx, admin_token)
        local cache_key = "ratelimit:" .. client_uuid
        local rate_limit = cache(cache_key, conf.cache_ttl, get_client_rate_limit, conf, client_uuid, admin_token)
        
        if not rate_limit or rate_limit <= 0 then
            core.log.warn("[PLUGIN] No rate limit found for client_id: ", client_uuid)
            return core.response.exit(403, { message = "Rate limit not configured for this client" })
        end
        
        ctx.var.jwt_claim_client_id = client_uuid
        
        local limit_conf = {
            count = rate_limit,
            time_window = 60,
            key_type = "var",
            key = "jwt_claim_client_id",
            rejected_code = 429,
            policy = "local",
        }
        
        core.log.warn("[PLUGIN] limit_conf: ", cjson.encode(limit_conf))
        return limit_count.rate_limit(limit_conf, ctx, "limit-count", 1)
    end
    
    local function decode_jwt_payload(token)
        if not token then
            return nil
        end
        local _, _, header, payload = token:find("^([^.]+)%.([^.]+)%.([^.]+)$")
        if not payload then
            return nil
        end
        -- base64url decode
        payload = payload:gsub("-", "+"):gsub("_", "/")
        local rem = #payload % 4
        if rem > 0 then
            payload = payload .. string.rep("=", 4 - rem)
        end
        local decoded = ngx.decode_base64(payload)
        if not decoded then
            return nil
        end
        local cjson = require("cjson.safe")
        return cjson.decode(decoded)
    end
    
    
    function plugin.access(conf, ctx)
        local auth_header = core.request.header(ctx, "authorization")
        local admin_token = cache("admin-token", conf.cache_ttl, get_admin_token, conf)
        if not admin_token then
            return core.response.exit(500, { message = "Unable to obtain admin token" })
        end
        
        if not auth_header then
            local client_uuid = core.request.header(ctx, conf.header)
            if not client_uuid then
                core.log.warn("Missing API key in header: ", conf.header)
                return 401, { message = "Missing API key" }
            end
            return apply_ratelimit(client_uuid, conf, ctx, admin_token)
        else
            local claims = ctx.var.jwt_claims
            local client_id
            
            if claims then
                client_id = claims["client_id"] or claims["azp"]
            else
                -- Fallback: JWT zelf decoden uit Authorization header
                local headers = core.request.headers(ctx)
                local auth = headers["authorization"]
                if auth then
                    local token = auth:match("Bearer%s+(.+)")
                    local payload = decode_jwt_payload(token)
                    core.log.warn("Decoded JWT payload: ", cjson.encode(payload))
                    if payload then
                        client_id = payload["client_id"] or payload["azp"]
                    end
                end
            end
            
            core.log.info("client_id resolved: ", client_id)
            if not client_id then
                return core.response.exit(400, { message = "Missing client_id" })
            end
            
            local clients = cache("keycloak-clients", conf.cache_ttl, get_all_clients, conf, admin_token)
            if not clients then
                return core.response.exit(500, { message = "Unable to fetch client list from Keycloak" })
            end
            
            local client_uuid = resolve_client_uuid(clients, client_id)
            if not client_uuid then
                core.log.warn("Geen client UUID gevonden voor client_id: ", client_id)
                return core.response.exit(403, { message = "Unknown client" })
            end
            
            return apply_ratelimit(client_uuid, conf, ctx, admin_token)
        end

    end
    
    plugin.schema = schema
    return plugin

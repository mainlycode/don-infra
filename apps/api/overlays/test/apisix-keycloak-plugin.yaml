apiVersion: v1
kind: ConfigMap
metadata:
  name: apisix-keycloak-plugins
data:
  keycloak-api-key-auth.lua: |
    local core = require("apisix.core")
    local http = require("resty.http")
    local cjson = require("cjson.safe")
    local plugin_name = "keycloak-unified-auth"
    
    local schema = {
        type = "object",
        properties = {
            token_url = { type = "string" },
            admin_api_url = { type = "string" },
            client_id = { type = "string" },
            client_secret = { type = "string" },
            header = { type = "string", default = "x-api-key" },
            cache_ttl = { type = "integer", default = 120 },
            policy_enforcement_mode = { type = "string", default = "ENFORCING" },
            scope_required = {
                type = "array",
                items = { type = "string" },
                default = {}
            }
            keycloak_authz = authz_keycloak.schema,
        },
        required = { "token_url", "admin_api_url", "client_id", "client_secret", "keycloak_authz" },
    }
    
    local plugin = {
        version = 0.4,
        priority = 3000,
        name = plugin_name,
        schema = schema
    }
    
    local cache = core.lrucache.new({ ttl = 300, count = 1000 })
    
    local function get_admin_token(conf)
        local httpc = http.new()
        local res, err = httpc:request_uri(conf.token_url, {
            method = "POST",
            body = "grant_type=client_credentials&client_id=" .. conf.client_id ..
                    "&client_secret=" .. conf.client_secret,
            headers = {
                ["Content-Type"] = "application/x-www-form-urlencoded"
            },
            ssl_verify = false,
        })
        
        if not res or res.status ~= 200 then
            core.log.error("Failed to obtain admin token: ", err or (res and res.body))
            return nil
        end
        
        local data = cjson.decode(res.body)
        return data.access_token
    end
    
    local function client_exists(conf, token, client_id)
        local url = conf.admin_api_url .. "/" .. client_id
        local httpc = http.new()
        local res, err = httpc:request_uri(url, {
            method = "GET",
            headers = {
                ["Authorization"] = "Bearer " .. token
            },
            ssl_verify = false
        })
        
        if not res or res.status ~= 200 then
            core.log.warn("Keycloak client lookup failed: ", err or (res and res.body))
            return false
        end
        
        local data = cjson.decode(res.body)
        return data and data.clientId ~= nil
    end
    
    local function decode_jwt_payload(token)
        if not token then
            return nil
        end
        local _, payload = token:match("^([^.]+)%.([^.]+)%.([^.]+)$")
        if not payload then
            return nil
        end
        payload = payload:gsub("-", "+"):gsub("_", "/")
        local rem = #payload % 4
        if rem > 0 then
            payload = payload .. string.rep("=", 4 - rem)
        end
        local decoded = ngx.decode_base64(payload)
        if not decoded then
            return nil
        end
        return cjson.decode(decoded)
    end
    
    local function is_jwt_expired(jwt)
        if not jwt or not jwt.exp then
            return true
        end
        return jwt.exp < ngx.time()
    end
    
    local function has_required_scopes(scope_string, required_scopes)
        if not scope_string then
            return false
        end
        local granted = {}
        for s in scope_string:gmatch("%S+") do
            granted[s] = true
        end
        for _, required in ipairs(required_scopes) do
            if not granted[required] then
                return false
            end
        end
        return true
    end
    
    local function check_jwt_permission(conf, token, required_scopes)
        local payload = decode_jwt_payload(token)
        if not payload then
            return false, 401, "Invalid JWT token"
        end
        if is_jwt_expired(payload) then
            return false, 401, "JWT token expired"
        end
        
        if not has_required_scopes(payload.scope, required_scopes) then
            return false, 403, "JWT does not have required scope"
        end
        
        return true
    end

    local function authorize_jwt_with_keycloak(conf, ctx)
        local status, body = authz_keycloak.access(conf.keycloak_authz, ctx)
        if status then
            return false, status, body
        end
        return true
    end
    
    function plugin.check_schema(conf)
        local ok, err = core.schema.check(schema, conf)
        if not ok then
            return ok, err
        end

        -- extra: valideren dat de embedded keycloak_authz ook klopt
        if conf.keycloak_authz then
            return authz_keycloak.check_schema(conf.keycloak_authz)
        end

        return true
    end
    
    function plugin.access(conf, ctx)
        local auth_header = core.request.header(ctx, "authorization")
        local api_key = core.request.header(ctx, conf.header)
        
        if auth_header then
            local ok, status, body = authorize_jwt_with_keycloak(conf, ctx)
            if not ok then
                return core.response.exit(status, body or { message = "Unauthorized" })
            end
            local jwt_token = auth_header:match("^[Bb]earer%s+(.+)$") or auth_header
            local jwt_payload = decode_jwt_payload(jwt_token)
            ctx.var.jwt_claims = jwt_payload or {}
            ctx.var.jwt_claim_client_id = jwt_payload and (jwt_payload.client_id or jwt_payload.azp)

            return
        elseif api_key then
            local admin_token = get_admin_token(conf)
            if not admin_token then
                return core.response.exit(500, { message = "Unable to obtain admin token" })
            end
            if not client_exists(conf, admin_token, api_key) then
                return core.response.exit(401, { message = "Invalid API key" })
            end
            
            -- Only allow specific scopes for API key clients
            local required_scopes = conf.scope_required or {}
            if not has_required_scopes("apis:read", required_scopes) then
                if not has_required_scopes("organisations:read", required_scopes) then
                    if not has_required_scopes("tools", required_scopes) then
                        if not has_required_scopes("oss:read", required_scopes) then
                            return core.response.exit(403, { message = "API key does not have required scope" })
                        end
                    end 
                end
            end
            
            ctx.var.jwt_claim_client_uuid = api_key
            return
        else
            return core.response.exit(401, { message = "Missing credentials (Authorization or x-api-key)" })
        end
    end
    
    plugin.schema = schema
    return plugin

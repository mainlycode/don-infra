apiVersion: v1
kind: ConfigMap
metadata:
  name: apisix-keycloak-plugins
data:
  keycloak-api-key-auth.lua: |
    local core = require("apisix.core")
    local http = require("resty.http")
    local cjson = require("cjson.safe")
    local plugin_name = "keycloak-unified-auth"
    
    local schema = {
        type = "object",
        properties = {
            token_url = { type = "string" },
            introspection_url = { type = "string", default = "" },
            admin_api_url = { type = "string" },
            client_id = { type = "string" },
            client_secret = { type = "string" },
            header = { type = "string", default = "x-api-key" },
            cache_ttl = { type = "integer", default = 120 },
            policy_enforcement_mode = { type = "string", default = "ENFORCING" },
            scope_required = {
                type = "array",
                items = { type = "string" },
                default = {}
            }
        },
        required = { "token_url", "admin_api_url", "client_id", "client_secret" }
    }
    
    local plugin = {
        version = 0.4,
        priority = 3000,
        name = plugin_name,
        schema = schema
    }
    
    local cache = core.lrucache.new({ ttl = 300, count = 1000 })
    
    local function get_admin_token(conf)
        local httpc = http.new()
        local res, err = httpc:request_uri(conf.token_url, {
            method = "POST",
            body = "grant_type=client_credentials&client_id=" .. conf.client_id ..
                    "&client_secret=" .. conf.client_secret,
            headers = {
                ["Content-Type"] = "application/x-www-form-urlencoded"
            },
            ssl_verify = false,
        })
        
        if not res or res.status ~= 200 then
            core.log.error("Failed to obtain admin token: ", err or (res and res.body))
            return nil
        end
        
        local data = cjson.decode(res.body)
        return data.access_token
    end
    
    local function client_exists(conf, token, client_id)
        local url = conf.admin_api_url .. "/" .. client_id
        local httpc = http.new()
        local res, err = httpc:request_uri(url, {
            method = "GET",
            headers = {
                ["Authorization"] = "Bearer " .. token
            },
            ssl_verify = false
        })
        
        if not res or res.status ~= 200 then
            core.log.warn("Keycloak client lookup failed: ", err or (res and res.body))
            return false
        end
        
        local data = cjson.decode(res.body)
        return data and data.clientId ~= nil
    end
    
    local function decode_jwt_payload(token)
        if not token then
            return nil
        end
        local _, payload = token:match("^([^.]+)%.([^.]+)%.([^.]+)$")
        if not payload then
            return nil
        end
        payload = payload:gsub("-", "+"):gsub("_", "/")
        local rem = #payload % 4
        if rem > 0 then
            payload = payload .. string.rep("=", 4 - rem)
        end
        local decoded = ngx.decode_base64(payload)
        if not decoded then
            return nil
        end
        return cjson.decode(decoded)
    end
    
    local function is_jwt_expired(jwt)
        if not jwt or not jwt.exp then
            return true
        end
        return jwt.exp < ngx.time()
    end
    
    local function has_required_scopes(scope_string, required_scopes)
        if not scope_string then
            return false
        end
        local granted = {}
        for s in scope_string:gmatch("%S+") do
            granted[s] = true
        end
        for _, required in ipairs(required_scopes) do
            if not granted[required] then
                return false
            end
        end
        return true
    end
    
    local function get_introspection_url(conf)
        if conf.introspection_url and conf.introspection_url ~= "" then
            return conf.introspection_url
        end
        if conf.token_url:find("/introspect$") then
            return conf.token_url
        end
        return conf.token_url .. "/introspect"
    end

    local function introspect_token(conf, token)
        local url = get_introspection_url(conf)
        local httpc = http.new()
        httpc:set_timeout(5000)

        local res, err = httpc:request_uri(url, {
            method = "POST",
            body = "token=" .. ngx.escape_uri(token) ..
                    "&client_id=" .. ngx.escape_uri(conf.client_id) ..
                    "&client_secret=" .. ngx.escape_uri(conf.client_secret),
            headers = {
                ["Content-Type"] = "application/x-www-form-urlencoded"
            },
            ssl_verify = false,
        })

        if not res then
            core.log.error("Token introspection request failed: ", err)
            return { __error = true, status = 500, message = "Failed to introspect token" }
        end

        if res.status ~= 200 then
            core.log.warn("Token introspection failed with status ", res.status, ": ", res.body)
            return { __error = true, status = 401, message = "Token introspection failed" }
        end

        local data = cjson.decode(res.body)
        if not data then
            core.log.error("Failed to decode token introspection response: ", res.body)
            return { __error = true, status = 500, message = "Invalid token introspection response" }
        end

        return data
    end

    local function check_jwt_permission(conf, token, required_scopes)
        if not token or token == "" then
            return false, 401, "Missing bearer token"
        end

        -- IMPORTANT: validate against Keycloak (RFC7662 token introspection), not just local JWT decode
        local cache_key = "kc_introspect:" .. ngx.md5(token)
        local info = cache(cache_key, conf.cache_ttl, introspect_token, conf, token)
        if not info then
            return false, 500, "Failed to introspect token"
        end

        if info.__error then
            return false, info.status or 401, info.message or "Unauthorized"
        end

        if info.active ~= true then
            return false, 401, "Token is not active"
        end

        if info.exp and info.exp < ngx.time() then
            return false, 401, "JWT token expired"
        end

        if required_scopes and #required_scopes > 0 and not has_required_scopes(info.scope, required_scopes) then
            return false, 403, "JWT does not have required scope"
        end

        return true, nil, nil, info
    end
    
    function plugin.check_schema(conf)
        return core.schema.check(schema, conf)
    end
    
    function plugin.access(conf, ctx)
        local auth_header = core.request.header(ctx, "authorization")
        local api_key = core.request.header(ctx, conf.header)
        
        if auth_header then
            local jwt_token = auth_header:match("^[Bb]earer%s+(.+)$")
            if not jwt_token then
                return core.response.exit(401, { message = "Invalid Authorization header format" })
            end
            local ok, status, err, token_info = check_jwt_permission(conf, jwt_token, conf.scope_required)
            if not ok then
                return core.response.exit(status, { message = err or "Unauthorized" })
            end

            -- Store Keycloak introspection result for upstream/logging
            ctx.var.jwt_claims = token_info
            ctx.var.jwt_claim_client_id = token_info.client_id or token_info.azp
            return
        elseif api_key then
            local admin_token = get_admin_token(conf)
            if not admin_token then
                return core.response.exit(500, { message = "Unable to obtain admin token" })
            end
            if not client_exists(conf, admin_token, api_key) then
                return core.response.exit(401, { message = "Invalid API key" })
            end
            
            -- Only allow specific scopes for API key clients
            local required_scopes = conf.scope_required or {}
            if not has_required_scopes("apis:read", required_scopes) then
                if not has_required_scopes("organisations:read", required_scopes) then
                    if not has_required_scopes("tools", required_scopes) then
                        if not has_required_scopes("repositories:read", required_scopes) then
                            if not has_required_scopes("gitOrganisations:read", required_scopes) then
                                return core.response.exit(403, { message = "API key does not have required scope" })
                            end
                        end
                    end 
                end
            end
            
            ctx.var.jwt_claim_client_uuid = api_key
            return
        else
            return core.response.exit(401, { message = "Missing credentials (Authorization or x-api-key)" })
        end
    end
    
    plugin.schema = schema
    return plugin
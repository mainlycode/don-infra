apiVersion: v1
kind: ConfigMap
metadata:
  name: apisix-config
data:
  config.yaml: |
    apisix:
      node_listen: 9080
      enable_admin: true
      enable_debug: false
      enable_ipv6: false
      log_level: warn

      admin_key:
        - name: "admin"
          key: "${ADMIN_API_KEY}"
          role: admin

      allow_admin:
        - 0.0.0.0/0
        - "::1"
      etcd:
        host:
          - "http://etcd:2379"
        prefix: "/apisix"
        timeout: 30

    plugins:
      - real-ip
      - prometheus
      - mocking
      - cors

    plugin_attr:
      prometheus:
        export_addr:
          ip: "0.0.0.0"
          port: 9091

    global_rules:
      - id: 1
        plugins:
          real-ip:
            source: "http_x_forwarded_for"

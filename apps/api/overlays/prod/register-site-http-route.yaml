apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: register-site-http-route
spec:
  parentRefs:
    - group: gateway.networking.x-k8s.io
      kind: XListenerSet
      name: tn-don
      namespace: istio-gateway
      sectionName: tn-don-prod-apis
  hostnames:
    - set-in-overlay
  rules:
    - backendRefs:
        - name: register-site-svc
          kind: Service
          port: 4321

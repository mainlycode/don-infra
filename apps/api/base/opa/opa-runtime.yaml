apiVersion: apps/v1
kind: Deployment
metadata:
  name: opa
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opa
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opa
    spec:
      containers:
        - name: opa
          image: openpolicyagent/opa:1.12.1
          args:
            - run
            - --server
            - --addr=0.0.0.0:8181
            - --log-level=debug
            - --ignore=.*
            - /policies
            - /data
          env:
            - name: OPA_KEYCLOAK_TOKEN_URL
              valueFrom:
                secretKeyRef:
                  name: opa-auth-config
                  key: token_url
                  optional: true
            - name: OPA_KEYCLOAK_INTROSPECTION_URL
              valueFrom:
                secretKeyRef:
                  name: opa-auth-config
                  key: introspection_url
                  optional: true
            - name: OPA_KEYCLOAK_ADMIN_API_URL
              valueFrom:
                secretKeyRef:
                  name: opa-auth-config
                  key: admin_api_url
                  optional: true
            - name: OPA_KEYCLOAK_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: opa-auth-config
                  key: client_id
                  optional: true
            - name: OPA_KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: opa-auth-config
                  key: client_secret
                  optional: true
            - name: OPA_KEYCLOAK_ADMIN_GRANT_TYPE
              valueFrom:
                secretKeyRef:
                  name: opa-auth-config
                  key: admin_grant_type
                  optional: true
          ports:
            - containerPort: 8181
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: opa-policy
              mountPath: /policies
              readOnly: true
            - name: opa-data
              mountPath: /data
              readOnly: true
      volumes:
        - name: opa-policy
          configMap:
            name: opa-policy
        - name: opa-data
          secret:
            secretName: opa-auth-config
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: opa
spec:
  selector:
    app.kubernetes.io/name: opa
  ports:
    - name: http
      port: 8181
      targetPort: http

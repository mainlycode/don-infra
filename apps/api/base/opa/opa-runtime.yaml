apiVersion: v1
kind: ConfigMap
metadata:
  name: opa-policy
data:
  apisix.rego: |
    package apisix.test

    default allow = false

    # Temporary test policy: allow only GET requests.
    # Non-GET returns 429 so you can quickly verify APISIX -> OPA enforcement.
    allow if {
      input.request.method == "GET"
    }

    reason := "Blocked by OPA test policy (only GET is allowed)" if {
      not allow
    }

    status_code := 429 if {
      not allow
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opa
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opa
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opa
    spec:
      containers:
        - name: opa
          image: openpolicyagent/opa:1.6.0
          args:
            - run
            - --server
            - --addr=0.0.0.0:8181
            - --log-level=debug
            - /policies
          ports:
            - containerPort: 8181
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: opa-policy
              mountPath: /policies
              readOnly: true
      volumes:
        - name: opa-policy
          configMap:
            name: opa-policy
---
apiVersion: v1
kind: Service
metadata:
  name: opa
spec:
  selector:
    app.kubernetes.io/name: opa
  ports:
    - name: http
      port: 8181
      targetPort: http

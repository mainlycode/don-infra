apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: repo-gatekeeper
spec:
  interval: 5m
  url: https://open-policy-agent.github.io/gatekeeper/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gatekeeper
spec:
  interval: 5m
  chart:
    spec:
      chart: gatekeeper
      version: 3.21.0
      sourceRef:
        kind: HelmRepository
        name: don-api-repo-gatekeeper
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace

apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: repo-apisix
spec:
  interval: 5m
  url: https://charts.apiseven.com
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: apisix
spec:
  interval: 5m
  chart:
    spec:
      chart: apisix
      version: 2.10.0
      sourceRef:
        kind: HelmRepository
        name: don-api-repo-apisix
  values:
    host: set-in-overlay
    replicaCount: 1
    ingress:
      enabled: true
      hostname: set-in-overlay
      tls: true
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod

    apisix:
      admin:
        credentials:
          secretName: don-api-apisix
        enabled: true
        ingress:
          enabled: true
          hostname: set-in-overlay
          tls: true
          annotations:
            cert-manager.io/cluster-issuer: letsencrypt-prod
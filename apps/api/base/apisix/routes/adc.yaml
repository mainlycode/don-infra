---
services:
- name: Tools API v1
  description: API van de Tools API
  routes:
  - name: validatorOpenAPIPost
    description: 'Valideert een OpenAPI specificatie met de DON ADR ruleset. Standaard
      wordt ruleset 2.1 gebruikt; geef targetVersion ''2.0'' of ''2.1'' mee om een
      versie te kiezen. Body: { oasUrl } of { oasBody } (stringified JSON of YAML).'
    methods:
    - POST
    uris:
    - "/tools/v1/oas/validate"
    plugins:
      proxy-rewrite:
        regex_uri:
        - "^/tools/(.*)"
        - "/$1"
        use_real_request_uri_unsafe: false
      cors:
        allow_origins: "*"
        allow_credential: false
        allow_headers: Authorization,Content-Type
        allow_methods: POST,OPTIONS
        max_age: 5
      opa:
        host: http://don-api-opa:8181
        policy: apisix/authz/result
        timeout: 3000
        with_route: true
    labels:
      required_scopes: tools
  - name: Bundle OAS
    description: 'Bundelt een OpenAPI specificatie en lost externe verwijzingen op.
      Body: { oasUrl } of { oasBody }.'
    methods:
    - POST
    uris:
    - "/tools/v1/oas/bundle"
    plugins:
      proxy-rewrite:
        regex_uri:
        - "^/tools/(.*)"
        - "/$1"
        use_real_request_uri_unsafe: false
      cors:
        allow_origins: "*"
        allow_credential: false
        allow_headers: Authorization,Content-Type
        allow_methods: POST,OPTIONS
        max_age: 5
      opa:
        host: http://don-api-opa:8181
        policy: apisix/authz/result
        timeout: 3000
        with_route: true
    labels:
      required_scopes: tools
  - name: createAuthClient
    description: Maak een nieuwe Auth Client aan (POST)
    methods:
    - POST
    uris:
    - "/tools/v1/auth/clients"
    plugins:
      proxy-rewrite:
        regex_uri:
        - "^/tools/(.*)"
        - "/$1"
        use_real_request_uri_unsafe: false
      cors:
        allow_origins: "*"
        allow_credential: false
        allow_headers: Authorization,Content-Type
        allow_methods: POST,OPTIONS
        max_age: 5
      opa:
        host: http://don-api-opa:8181
        policy: apisix/authz/result
        timeout: 3000
        with_route: true
    labels:
      required_scopes: tools
      allow_api_key_methods: POST
  - name: ConvertOAS
    description: Converteer OpenAPI 3.0/3.1
    methods:
    - POST
    uris:
    - "/tools/v1/oas/convert"
    plugins:
      proxy-rewrite:
        regex_uri:
        - "^/tools/(.*)"
        - "/$1"
        use_real_request_uri_unsafe: false
      cors:
        allow_origins: "*"
        allow_credential: false
        allow_headers: Authorization,Content-Type
        allow_methods: POST,OPTIONS
        max_age: 5
      opa:
        host: http://don-api-opa:8181
        policy: apisix/authz/result
        timeout: 3000
        with_route: true
    labels:
      required_scopes: tools
  - name: convertOpenAPIToPostmanPost
    description: Maak Postman-collectie (POST)
    methods:
    - POST
    uris:
    - "/tools/v1/oas/postman"
    plugins:
      proxy-rewrite:
        regex_uri:
        - "^/tools/(.*)"
        - "/$1"
        use_real_request_uri_unsafe: false
      cors:
        allow_origins: "*"
        allow_credential: false
        allow_headers: Authorization,Content-Type
        allow_methods: POST,OPTIONS
        max_age: 5
      opa:
        host: http://don-api-opa:8181
        policy: apisix/authz/result
        timeout: 3000
        with_route: true
    labels:
      required_scopes: tools
  - name: arazzo markdown
    description: 'Genereert alleen de Markdown-uitvoer van een Arazzo specificatie.
      Body: { oasUrl|oasBody }'
    methods:
    - POST
    uris:
    - "/tools/v1/arazzo/markdown"
    plugins:
      proxy-rewrite:
        regex_uri:
        - "^/tools/(.*)"
        - "/$1"
        use_real_request_uri_unsafe: false
      cors:
        allow_origins: "*"
        allow_credential: false
        allow_headers: Authorization,Content-Type
        allow_methods: POST,OPTIONS
        max_age: 5
      opa:
        host: http://don-api-opa:8181
        policy: apisix/authz/result
        timeout: 3000
        with_route: true
    labels:
      required_scopes: tools
  - name: arazzo mermaid
    description: 'Genereert alleen de Mermaid flowchart van een Arazzo specificatie.
      Body: { oasUrl|oasBody }'
    methods:
    - POST
    uris:
    - "/tools/v1/arazzo/mermaid"
    plugins:
      proxy-rewrite:
        regex_uri:
        - "^/tools/(.*)"
        - "/$1"
        use_real_request_uri_unsafe: false
      cors:
        allow_origins: "*"
        allow_credential: false
        allow_headers: Authorization,Content-Type
        allow_methods: POST,OPTIONS
        max_age: 5
      opa:
        host: http://don-api-opa:8181
        policy: apisix/authz/result
        timeout: 3000
        with_route: true
    labels:
      required_scopes: tools
  - name: ConvertOAS
    description: 'Converteert OpenAPI naar de laatst ondersteunde versie (standaard
      3.1). Meegegeven targetVersion (3.0 of 3.1) bepaalt het doel. Body: { oasUrl
      } of { oasBody } (stringified JSON of YAML).'
    methods:
    - POST
    uris:
    - "/tools/v1/oas/convert"
    plugins:
      proxy-rewrite:
        regex_uri:
        - "^/tools/(.*)"
        - "/$1"
        use_real_request_uri_unsafe: false
      cors:
        allow_origins: "*"
        allow_credential: false
        allow_headers: Authorization,Content-Type
        allow_methods: POST,OPTIONS
        max_age: 5
      opa:
        host: http://don-api-opa:8181
        policy: apisix/authz/result
        timeout: 3000
        with_route: true
    labels:
      required_scopes: tools
  - name: Generate OAS
    description: 'Genereert een boilerplate OpenAPI specificatie op basis van JSON-invoer.
      Body: { oasUrl } of { oasBody } (stringified JSON).'
    methods:
    - POST
    uris:
    - "/tools/v1/oas/generate"
    plugins:
      proxy-rewrite:
        regex_uri:
        - "^/tools/(.*)"
        - "/$1"
        use_real_request_uri_unsafe: false
      cors:
        allow_origins: "*"
        allow_credential: false
        allow_headers: Authorization,Content-Type
        allow_methods: POST,OPTIONS
        max_age: 5
      opa:
        host: http://don-api-opa:8181
        policy: apisix/authz/result
        timeout: 3000
        with_route: true
    labels:
      required_scopes: tools
  - name: openapiSpec
    description: OpenAPI-specificatie ophalen
    methods:
    - GET
    uris:
    - "/tools/v1/openapi.json"
    plugins:
      proxy-rewrite:
        regex_uri:
        - "^/tools/(.*)"
        - "/$1"
        use_real_request_uri_unsafe: false
      cors:
        allow_origins: "*"
        allow_credential: false
        allow_headers: Authorization,x-api-key,Content-Type
        allow_methods: GET,OPTIONS
        max_age: 5
  upstream:
    scheme: http
    nodes:
    - host: don-api-tools-svc
      port: 1338
      weight: 100
    timeout:
      connect: 60
      send: 60
      read: 60
    pass_host: pass

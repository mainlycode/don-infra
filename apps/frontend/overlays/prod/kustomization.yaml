apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - piwik-secret.yaml

namespace: tn-don-frontend
namePrefix: don-frontend-

commonLabels:
  app: frontend

images:
  - name: static
    newName: ghcr.io/developer-overheid-nl/don-site
    newTag: 45757bed1bebdcea50e2006464443bed5b5fe562

patches:
  - target:
      kind: Ingress
      name: ing
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: developer.overheid.nl
      - op: replace
        path: /spec/tls/0/hosts/0
        value: developer.overheid.nl

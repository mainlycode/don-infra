apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - http-route.yaml
  - piwik-secret.yaml
namespace: tn-don-frontend-prod
namePrefix: don-frontend-
commonLabels:
  app: frontend
images:
  - name: static
    newName: ghcr.io/developer-overheid-nl/don-site
    newTag: 6b0dd4c4c100d237517c2c18e3f12ddaeac27d45
patches:
  - target:
      kind: HTTPRoute
      name: http-route
    patch: |
      - op: replace
        path: /spec/hostnames/0
        value: developer.overheid.nl

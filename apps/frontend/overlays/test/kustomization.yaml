apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - http-route.yaml
  - piwik-secret.yaml
namespace: tn-don-frontend
namePrefix: don-frontend-
commonLabels:
  app: frontend
images:
  - name: static
    newName: ghcr.io/developer-overheid-nl/don-site
    newTag: 2abd9cde051d06906895458e11648af0e71ddc85
patches:
  - target:
      kind: Ingress
      name: ing
    patch: |
      - op: replace
        path: /spec/ingressClassName
        value: disabled
  - target:
      kind: HTTPRoute
      name: http-route
    patch: |
      - op: replace
        path: /spec/hostnames/0
        value: don.don.projects.digilab.network

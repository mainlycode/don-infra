apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: tn-don-frontend
namePrefix: don-frontend-

commonLabels:
  app: frontend

images:
  - name: static
    newName: ghcr.io/developer-overheid-nl/don-site
    newTag: 3b343dc09c95e942f3c774d32e6233112b64f8e7

patches:
  - target:
      kind: Ingress
      name: ing
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: don.apps.digilab.network
      - op: replace
        path: /spec/tls/0/hosts/0
        value: don.apps.digilab.network

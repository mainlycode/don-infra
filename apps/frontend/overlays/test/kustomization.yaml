apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: tn-don-frontend
namePrefix: don-frontend-

commonLabels:
  app: frontend

images:
  - name: static
    newName: ghcr.io/developer-overheid-nl/don-site
    newTag: 8aebd78b5f5207ce5e862e2e489161ca37855fbc

patches:
  - target:
      kind: Ingress
      name: ing
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: don.apps.digilab.network
      - op: replace
        path: /spec/tls/0/hosts/0
        value: don.apps.digilab.network

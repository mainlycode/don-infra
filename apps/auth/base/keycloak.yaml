apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: repo-keycloak
spec:
  type: oci
  interval: 5m
  url: oci://registry-1.docker.io/bitnamicharts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloak
spec:
  interval: 5m
  chart:
    spec:
      chart: keycloak
      version: 24.7.5
      sourceRef:
        kind: HelmRepository
        name: don-auth-repo-keycloak
  values:
    extraEnvVars:
      - name: NAMI_LOG_LEVEL
        value: trace
    replicaCount: 1
    production: false
    auth:
      adminUser:
        valueFrom:
          secretKeyRef:
            name: keycloak-secret
            key: admin-user
      adminPassword:
        valueFrom:
          secretKeyRef:
            name: keycloak-secret
            key: admin-password
    postgresql:
      enabled: false
    externalDatabase:
      existingSecret: don-auth-postgress-keycloak-secret
      existingSecretHostKey: database-host
      existingSecretUserKey: database-user
      existingSecretDatabaseKey: database-name
      existingSecretPasswordKey: database-password
    ingress:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hostname: set-in-overlay
      extraTls:
        - hosts:
            - set-in-overlay
          secretName: auth-tls
    service:
      type: ClusterIP
    podAnnotations: {}
    podLabels: {}

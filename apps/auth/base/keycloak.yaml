apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: repo-keycloak
spec:
  type: oci
  interval: 5m
  url: oci://registry-1.docker.io/bitnamicharts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloak
spec:
  interval: 5m
  chart:
    spec:
      chart: keycloak
      version: 24.7.5
      sourceRef:
        kind: HelmRepository
        name: don-auth-repo-keycloak
  values:
    replicaCount: 1
    production: false
    auth:
      existingSecret: don-auth-keycloak-login-secret
    postgresql:
      auth:
        password: ignored-but-required
      enabled: false
    externalDatabase:
      existingSecret: don-auth-keycloak-login-secret
      existingSecretHostKey: db-host
      existingSecretUserKey: db-user
      existingSecretDatabaseKey: db-name
      existingSecretPasswordKey: db-password
    extraEnvVars:
      - name: KC_DB
        value: 'postgresql'
      - name: KC_DB_URL
        valueFrom:
          secretKeyRef:
            name: don-auth-keycloak-login-secret
            key: KC_DB_URL
    ingress:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hostname: set-in-overlay
      extraTls:
        - hosts:
            - set-in-overlay
          secretName: auth-tls
    service:
      type: ClusterIP
    podAnnotations: {}
    podLabels: {}
#    extraStartupArgs: "--import-realm"
#
#    extraVolumes:
#      - name: realm-config
#        configMap:
#          name: don-auth-keycloak-realm-config

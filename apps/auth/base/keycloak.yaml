apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: repo-keycloak
spec:
  type: oci
  interval: 5m
  url: oci://registry-1.docker.io/bitnamicharts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloak
spec:
  interval: 5m
  chart:
    spec:
      chart: keycloak
      version: 24.7.5
      sourceRef:
        kind: HelmRepository
        name: don-auth-repo-keycloak
  values:
    image:
      repository: bitnamilegacy/keycloak
    proxyHeaders: forwarded
    replicaCount: 1
    production: false
    auth:
      adminUser: don
      existingSecret: don-auth-keycloak-login-secret
    postgresql:
      enabled: false
      auth:
        password: ignored-but-required

    externalDatabase:
      password: ignored-but-required
      existingSecret: don-auth-keycloak-login-secret
      existingSecretHostKey: db-host
      existingSecretUserKey: db-user
      existingSecretDatabaseKey: db-name
      existingSecretPasswordKey: db-password

    extraEnvVars:
      - name: KEYCLOAK_JDBC_PARAMS
        value: "sslmode=require&currentSchema=don_auth"
      - name: KC_DB_SCHEMA
        value: don_auth
      - name: KEYCLOAK_EXTRA_ARGS
        value: "--import-realm  --features=scripts"
    ingress:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hostname: set-in-overlay
      extraTls:
        - hosts:
            - set-in-overlay
          secretName: auth-tls
    service:
      type: ClusterIP
    podAnnotations: {}
    podLabels: {}
    extraVolumes:
      - name: realm-config
        configMap:
          name: don-auth-keycloak-realm-config
    extraVolumeMounts:
      - name: realm-config
        mountPath: /opt/bitnami/keycloak/data/import
        readOnly: true

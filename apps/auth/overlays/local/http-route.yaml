apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-route
spec:
  parentRefs:
    - name: public-gateway
      namespace: istio-gateway
      sectionName: https
  hostnames:
    - set-in-overlay
  rules:
    - backendRefs:
        - name: don-auth-keycloak
          kind: Service
          port: 80

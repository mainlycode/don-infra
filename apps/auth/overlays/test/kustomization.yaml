apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - keycloak-secret.yaml
  - keycloak-realm-config.yaml

namespace: tn-don-auth
namePrefix: don-auth-

commonLabels:
  app: auth

patches:
  - target:
      kind: Ingress
      name: keycloak-ingress
    patch: |
      - op: replace
        path: /spec/values/replicaCount
        value: 1
      - op: replace
        path: /spec/values/ingress/hosts/0/host
        value: auth.don.apps.digilab.network
      - op: replace
        path: /spec/values/ingress/tls/0/hosts/0
        value: auth.don.apps.digilab.network
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - keycloak-secret.yaml
  - keycloak-realm-config.yaml
  - postgress-keycloak-secret.yaml

namespace: tn-don-auth
namePrefix: don-auth-

commonLabels:
  app: auth

patches:
  - target:
      kind: HelmRelease
      name: keycloak
    patch: |
      - op: replace
        path: /spec/values/replicaCount
        value: 2
      - op: replace
        path: /spec/values/ingress/hostname
        value: auth.don.apps.digilab.network
      - op: replace
        path: /spec/values/ingress/extraTls/0/hosts/0
        value: auth.don.apps.digilab.network
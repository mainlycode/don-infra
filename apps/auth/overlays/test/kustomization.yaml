apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - keycloak.yaml

namespace: tn-don-auth
namePrefix: don-auth-

commonLabels:
  app: auth

images:
  - name: keycloak
    newName: quay.io/keycloak/keycloak
    newTag: "26.2"

patches:
  - target:
      kind: Ingress
      name: keycloak-ingress
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: auth.don.apps.digilab.network
      - op: replace
        path: /spec/tls/0/hosts/0
        value: auth.don.apps.digilab.network
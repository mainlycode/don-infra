apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - don-matomo-secret.yaml

namespace: tn-don-analytics
namePrefix: don-analytics-

commonLabels:
  app: analytics

patches:
  - target:
      kind: HelmRelease
      name: matomo
    patch: |
      - op: replace
        path: /spec/values/ingress/hostname
        value: matomo.don.apps.digilab.network

apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: matomo
spec:
  interval: 5m
  url: https://charts.bitnami.com/bitnami
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: matomo
spec:
  interval: 5m
  chart:
    spec:
      chart: matomo
      version: 11.0.1
      sourceRef:
        kind: HelmRepository
        name: matomo
  values:
    replicaCount: 1
    image:
      debug: false
    ingress:
      enabled: true
      hostname: set-in-overlay
      tls: true
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
    matomoSkipInstall: false
    matomoUsername: don
    matomoEmail: developer.overheid@geonovum.nl
    matomoWebsiteName: Developer Overheid
    existingSecret: don-matomo-secret
    persistence:
      enabled: true
      storageClass: azurefile-csi
      accessModes:
        - ReadWriteMany
      size: 10Gi
    mariadb:
      enabled: true

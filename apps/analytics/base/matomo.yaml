apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: repo-matomo
spec:
  type: oci
  interval: 5m
  url: oci://registry-1.docker.io/bitnamicharts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: matomo
spec:
  interval: 5m
  chart:
    spec:
      chart: matomo
      version: 11.0.0
      sourceRef:
        kind: HelmRepository
        name: don-analytics-repo-matomo
  values:
    global:
      security:
        allowInsecureImages: true
    image:
      registry: docker.io
      repository: bitnamilegacy/matomo
      tag: 5.3.2-debian-12-r12
      pullPolicy: IfNotPresent
    replicaCount: 1
    ingress:
      enabled: true
      hostname: set-in-overlay
      tls: true
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
    matomoSkipInstall: false
    matomoUsername: don
    matomoEmail: developer.overheid@geonovum.nl
    matomoWebsiteName: Developer Overheid
    mariadb:
      enabled: true
      image:
        registry: docker.io
        repository: bitnamilegacy/mariadb
        tag: 12.0.2-debian-12-r0
        pullPolicy: IfNotPresent

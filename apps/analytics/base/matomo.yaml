apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: repo-matomo
spec:
  interval: 5m
  url: https://charts.bitnami.com/bitnami
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: matomo
spec:
  interval: 5m
  chart:
    spec:
      chart: matomo
      version: 11.0.0
      sourceRef:
        kind: HelmRepository
        name: don-analytics-repo-matomo
  values:
    replicaCount: 1
    ingress:
      enabled: true
      hostname: set-in-overlay
      tls: true
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
    matomoSkipInstall: false
    matomoUsername: don
    matomoEmail: developer.overheid@geonovum.nl
    matomoWebsiteName: Developer Overheid
    mariadb:
      enabled: true

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - oss-db.yaml
  - register-site-secret.yaml
  - don-crawler-secret.yaml
  - piwik-secret.yaml

namespace: tn-don-oss
namePrefix: don-oss-

labels:
  - pairs:
      app.kubernetes.io/part-of: oss
    includeSelectors: false
    includeTemplates: true

images:
  - name: don-oss-register
    newName: ghcr.io/developer-overheid-nl/don-oss-register
    newTag: bb88c89e741306a8c217a0d35a4ac0d0a7fd7d7b
  - name: don-register-oss-site
    newName: ghcr.io/developer-overheid-nl/don-register-oss-site
    newTag: 212157d21d22ecd727691bbb3cac584ea26ab53e
  - name: don-crawler
    newName: ghcr.io/developer-overheid-nl/don-crawler
    newTag: 30e83d0d262f36fad3b9f15064c56e202ecbf8ab

patches:
  - target:
        kind: Ingress
        name: oss-register-site-ing
    patch: |    
      - op: replace
        path: /spec/rules/0/host
        value: oss-register.don.apps.digilab.network
      - op: replace
        path: /spec/tls/0/hosts/0
        value: oss-register.don.apps.digilab.network
  - target:
        kind: CronJob
        name: oss-crawler
    patch: |-
      - op: add
        path: /spec/suspend
        value: true

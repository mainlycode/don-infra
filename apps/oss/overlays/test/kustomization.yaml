apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - http-route.yaml
  - oss-db.yaml
  - register-site-secret.yaml
  - don-crawler-secret.yaml
  - piwik-secret.yaml
namespace: tn-don-oss
namePrefix: don-oss-
labels:
  - pairs:
      app.kubernetes.io/part-of: oss
    includeSelectors: false
    includeTemplates: true
images:
  - name: don-oss-register
    newName: ghcr.io/developer-overheid-nl/don-oss-register
    newTag: fdb09b3e9d231dfd74c6b361dbc258b75714f015
  - name: don-register-oss-site
    newName: ghcr.io/developer-overheid-nl/don-register-oss-site
    newTag: 52938fcde1e14581fbad6e07e8534ccc1581dc2c
  - name: don-crawler
    newName: ghcr.io/developer-overheid-nl/don-crawler
    newTag: c04c484bc360eca8647d4ab7afa9728d530ade98
patches:
  # Keep in sync with base: CRAWL_STALE_AFTER_HOURS is intentionally env[0].
  - target:
      kind: Deployment
      name: oss-register-dpl
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: "168"
  - target:
      kind: Ingress
      name: oss-register-site-ing
    patch: |
      - op: replace
        path: /spec/ingressClassName
        value: disabled
  - target:
      kind: HTTPRoute
      name: http-route
    patch: |
      - op: replace
        path: /spec/hostnames/0
        value: oss-register.projects.digilab.network
  - target:
      kind: CronJob
      name: oss-crawler
    patch: |-
      - op: add
        path: /spec/suspend
        value: true

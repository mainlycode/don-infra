apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - oss-db.yaml
  - register-site-secret.yaml
  - don-crawler-secret.yaml

namespace: tn-don-oss
namePrefix: don-oss-

labels:
  - pairs:
      app.kubernetes.io/part-of: oss
    includeSelectors: false
    includeTemplates: true

images:
  - name: don-oss-register
    newName: ghcr.io/developer-overheid-nl/don-oss-register
    newTag: 3b81187536c72ab7b0d3fc4b9948ea05e659b78b
  - name: don-register-oss-site
    newName: ghcr.io/developer-overheid-nl/don-register-oss-site
    newTag: 92facd6116e29ee6e7bc39d86191f904f5d54b2f
  - name: don-oss-crawler
    newName: ghcr.io/developer-overheid-nl/don-oss-crawler
    newTag: 014ea32082f977ddcad0fef28de8aa3c3685883d

patches:
  - target:
        kind: Ingress
        name: oss-register-site-ing
    patch: |    
      - op: replace
        path: /spec/rules/0/host
        value: oss-register.don.apps.digilab.network
      - op: replace
        path: /spec/tls/0/hosts/0
        value: oss-register.don.apps.digilab.network

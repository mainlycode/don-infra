apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - oss-db.yaml
  - register-site-secret.yaml
  - don-crawler-secret.yaml

namespace: tn-don-oss
namePrefix: don-oss-

labels:
  - pairs:
      app.kubernetes.io/part-of: oss
    includeSelectors: false
    includeTemplates: true

images:
  - name: don-oss-register
    newName: ghcr.io/developer-overheid-nl/don-oss-register
    newTag: a84bb8b091c7bbdb9aebab5c2db447d825b91cd2
  - name: don-register-oss-site
    newName: ghcr.io/developer-overheid-nl/don-register-oss-site
    newTag: dbee44407f3df0ab3fb782e69be74bac3a87a0eb
  - name: don-crawler
    newName: ghcr.io/developer-overheid-nl/don-crawler
    newTag: fdc3546337f9e4ce673c3af99abda5e4c987a876

patches:
  - target:
        kind: Ingress
        name: oss-register-site-ing
    patch: |    
      - op: replace
        path: /spec/rules/0/host
        value: oss-register.don.apps.digilab.network
      - op: replace
        path: /spec/tls/0/hosts/0
        value: oss-register.don.apps.digilab.network
  - target:
        kind: CronJob
        name: oss-crawler
    patch: |-
      - op: add
        path: /spec/suspend
        value: false

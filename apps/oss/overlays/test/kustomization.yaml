apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - oss-db.yaml
  - register-site-secret.yaml
  - don-crawler-secret.yaml
  - piwik-secret.yaml

namespace: tn-don-oss
namePrefix: don-oss-

labels:
  - pairs:
      app.kubernetes.io/part-of: oss
    includeSelectors: false
    includeTemplates: true

images:
  - name: don-oss-register
    newName: ghcr.io/developer-overheid-nl/don-oss-register
    newTag: 25412ad362c916307edb864b4e98bd639824adee
  - name: don-register-oss-site
    newName: ghcr.io/developer-overheid-nl/don-register-oss-site
    newTag: 807df0e2d74a25a897e82442c6766303df98bb94
  - name: don-crawler
    newName: ghcr.io/developer-overheid-nl/don-crawler
    newTag: 30e83d0d262f36fad3b9f15064c56e202ecbf8ab

patches:
  # Keep in sync with base: CRAWL_STALE_AFTER_HOURS is intentionally env[0].
  - target:
        kind: Deployment
        name: oss-register-dpl
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: "168"
  - target:
        kind: Ingress
        name: oss-register-site-ing
    patch: |    
      - op: replace
        path: /spec/rules/0/host
        value: oss-register.don.apps.digilab.network
      - op: replace
        path: /spec/tls/0/hosts/0
        value: oss-register.don.apps.digilab.network
  - target:
        kind: CronJob
        name: oss-crawler
    patch: |-
      - op: add
        path: /spec/suspend
        value: true

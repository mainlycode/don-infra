apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - http-route.yaml
  - oss-db.yaml
  - register-site-secret.yaml
  - don-crawler-secret.yaml
  - piwik-secret.yaml
namespace: tn-don-oss-test
namePrefix: don-oss-
labels:
  - pairs:
      app.kubernetes.io/part-of: oss
    includeSelectors: false
    includeTemplates: true
images:
  - name: don-oss-register
    newName: ghcr.io/developer-overheid-nl/don-oss-register
    newTag: 5a23be8eb16b48baae96b31b53344b82a8dbc2d7
  - name: don-register-oss-site
    newName: ghcr.io/developer-overheid-nl/don-register-oss-site
    newTag: 280df057ba2852ddb80eee933e8ff3dfc1fb537d
  - name: don-crawler
    newName: ghcr.io/developer-overheid-nl/don-crawler
    newTag: bf0305e26c481e0b3cbb25b913f6b73df429acfb
patches:
  # Keep in sync with base: CRAWL_STALE_AFTER_HOURS is intentionally env[0].
  - target:
      kind: Deployment
      name: oss-register-dpl
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: "168"
  - target:
      kind: HTTPRoute
      name: http-route
    patch: |
      - op: replace
        path: /spec/hostnames/0
        value: oss-register.don.projects.digilab.network
  - target:
      kind: CronJob
      name: oss-crawler
    patch: |-
      - op: add
        path: /spec/suspend
        value: true

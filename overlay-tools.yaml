overlay: 1.0.0
info:
  title: APISIX overlay voor DON Tools API v1
  version: 0.1.0

actions:
  # /v1/bruno/convert (GET)
  - target: $.paths["/v1/bruno/convert"].get
    update:
      x-adc-status: 1
      x-adc-uri: /v1/bruno/convert
      x-adc-upstream:
        scheme: http
        nodes:
          ${endpoint:port}: 1
        hash_on: vars
        type: roundrobin
        pass_host: pass
      x-adc-plugins:
        rate-limit-by-keycloak-attribute:
          client_secret: C7dZAGOU5ExAK4ixo7bSr5nQksbCP4xP
          client_id: don-admin-client
          cache_ttl: 300
          admin_api_url: https://auth.don.apps.digilab.network/admin/realms/don/clients/
          token_url: https://auth.don.apps.digilab.network/realms/don/protocol/openid-connect/token
        proxy-rewrite:
          regex_uri:
            - ^/(.*)
            - /$1
          use_real_request_uri_unsafe: false
        cors:
          allow_origins: '*'
          allow_credential: false
          allow_headers: Authorization,x-api-key,Content-Type
          allow_methods: '*'
          max_age: 5
        keycloak-api-key-auth:
          token_url: https://auth.don.apps.digilab.network/realms/don/protocol/openid-connect/token
          client_secret: C7dZAGOU5ExAK4ixo7bSr5nQksbCP4xP
          client_id: don-admin-client
          cache_ttl: 120
          policy_enforcement_mode: ENFORCING
          header: x-api-key
          admin_api_url: https://auth.don.apps.digilab.network/admin/realms/don/clients/
          scope_required:
            - tools:read


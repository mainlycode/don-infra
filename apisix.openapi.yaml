openapi: 3.0.3
info:
  title: API register API v1
  description: API van het API register (apis.developer.overheid.nl)
  version: 1.0.0
  contact:
    name: Team developer.overheid.nl
    email: developer.overheid@geonovum.nl
    url: 'https://github.com/developer-overheid-nl/don-api-register/issues'
servers:
  - url: 'https://api.developer.overheid.nl/api-register/v1'
    description: Productie
  - url: 'https://api-register.don.apps.digilab.network/api-register/v1'
    description: Test
paths:
  /apis:
    get:
      security:
        - apiKey: []
        - clientCredentials:
            - 'apis:read'
      summary: Alle API's ophalen
      operationId: listApis
      tags:
        - Publieke endpoints
      description: Alle API's ophalen
      responses:
        '200':
          description: OK
          headers:
            API-Version:
              $ref: '#/components/headers/API-Version'
          content:
            application/json:
              schema:
                type: object
                properties:
                  apis:
                    type: array
                    items:
                      $ref: '#/components/schemas/ApiSummary'
                  _links:
                    required:
                      - self
                    type: object
                    properties:
                      first:
                        type: object
                        properties:
                          href:
                            type: string
                            example: >-
                              https://api.developer.overheid.nl/api-register/v1/apis?page=1
                      prev:
                        type: object
                        properties:
                          href:
                            type: string
                            example: >-
                              https://api.developer.overheid.nl/api-register/v1/apis?page=2
                      self:
                        type: object
                        properties:
                          href:
                            type: string
                            example: >-
                              https://api.developer.overheid.nl/api-register/v1/apis?page=3
                      next:
                        type: object
                        properties:
                          href:
                            type: string
                            example: >-
                              https://api.developer.overheid.nl/api-register/v1/apis?page=4
                      last:
                        type: object
                        properties:
                          href:
                            type: string
                            example: >-
                              https://api.developer.overheid.nl/api-register/v1/apis?page=5
      x-adc-status: 1
      x-adc-uri: /apis
      x-adc-upstream:
        scheme: http
        nodes:
          'don-api-api-register-svc:1337': 1
        hash_on: vars
        type: roundrobin
        pass_host: pass
      x-adc-plugins:
        rate-limit-by-keycloak-attribute:
          client_secret: C7dZAGOU5ExAK4ixo7bSr5nQksbCP4xP
          client_id: don-admin-client
          cache_ttl: 300
          admin_api_url: 'https://auth.don.apps.digilab.network/admin/realms/don/clients/'
          token_url: >-
            https://auth.don.apps.digilab.network/realms/don/protocol/openid-connect/token
        proxy-rewrite:
          regex_uri:
            - ^/(.*)
            - /$1
          use_real_request_uri_unsafe: false
        cors:
          allow_origins: '*'
          allow_credential: false
          allow_headers: 'Authorization,x-api-key,Content-Type'
          allow_methods: '*'
          max_age: 5
        keycloak-api-key-auth:
          token_url: >-
            https://auth.don.apps.digilab.network/realms/don/protocol/openid-connect/token
          client_secret: C7dZAGOU5ExAK4ixo7bSr5nQksbCP4xP
          client_id: don-admin-client
          cache_ttl: 120
          policy_enforcement_mode: ENFORCING
          header: x-api-key
          admin_api_url: 'https://auth.don.apps.digilab.network/admin/realms/don/clients/'
          scope_required:
            - 'apis:read'
    post:
      security:
        - clientCredentials:
            - 'apis:write'
      summary: Registreer een nieuwe API met een OpenAPI URL
      operationId: createApi
      tags:
        - Private endpoints
      description: Registreer een nieuwe API met een OpenAPI URL
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiPost'
      responses:
        '201':
          description: Created
          headers:
            API-Version:
              description: De API-versie van de response
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSummary'
        '400':
          $ref: '#/components/responses/400'
      x-adc-status: 1
      x-adc-uri: /apis
      x-adc-upstream:
        scheme: http
        nodes:
          'don-api-api-register-svc:1337': 1
        hash_on: vars
        type: roundrobin
        pass_host: pass
      x-adc-plugins:
        rate-limit-by-keycloak-attribute:
          client_secret: C7dZAGOU5ExAK4ixo7bSr5nQksbCP4xP
          client_id: don-admin-client
          cache_ttl: 300
          admin_api_url: 'https://auth.don.apps.digilab.network/admin/realms/don/clients/'
          token_url: >-
            https://auth.don.apps.digilab.network/realms/don/protocol/openid-connect/token
        proxy-rewrite:
          regex_uri:
            - ^/(.*)
            - /$1
          use_real_request_uri_unsafe: false
        cors:
          allow_origins: '*'
          allow_credential: false
          allow_headers: 'Authorization,x-api-key,Content-Type'
          allow_methods: '*'
          max_age: 5
        keycloak-api-key-auth:
          token_url: >-
            https://auth.don.apps.digilab.network/realms/don/protocol/openid-connect/token
          client_secret: C7dZAGOU5ExAK4ixo7bSr5nQksbCP4xP
          client_id: don-admin-client
          cache_ttl: 120
          policy_enforcement_mode: ENFORCING
          header: x-api-key
          admin_api_url: 'https://auth.don.apps.digilab.network/admin/realms/don/clients/'
          scope_required:
            - 'apis:write'
  '/apis/{id}':
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      security:
        - apiKey: []
        - clientCredentials:
            - 'apis:read'
      summary: Specifieke API ophalen
      operationId: retreiveApi
      tags:
        - Publieke endpoints
      description: Specifieke API ophalen
      responses:
        '200':
          description: OK
          headers:
            API-Version:
              description: De API-versie van de response
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDetail'
        '404':
          $ref: '#/components/responses/404'
      x-adc-status: 1
      x-adc-uri: '/apis/{id}'
      x-adc-upstream:
        scheme: http
        nodes:
          'don-api-api-register-svc:1337': 1
        hash_on: vars
        type: roundrobin
        pass_host: pass
      x-adc-plugins:
        rate-limit-by-keycloak-attribute:
          client_secret: C7dZAGOU5ExAK4ixo7bSr5nQksbCP4xP
          client_id: don-admin-client
          cache_ttl: 300
          admin_api_url: 'https://auth.don.apps.digilab.network/admin/realms/don/clients/'
          token_url: >-
            https://auth.don.apps.digilab.network/realms/don/protocol/openid-connect/token
        proxy-rewrite:
          regex_uri:
            - ^/(.*)
            - /$1
          use_real_request_uri_unsafe: false
        cors:
          allow_origins: '*'
          allow_credential: false
          allow_headers: 'Authorization,x-api-key,Content-Type'
          allow_methods: '*'
          max_age: 5
        keycloak-api-key-auth:
          token_url: >-
            https://auth.don.apps.digilab.network/realms/don/protocol/openid-connect/token
          client_secret: C7dZAGOU5ExAK4ixo7bSr5nQksbCP4xP
          client_id: don-admin-client
          cache_ttl: 120
          policy_enforcement_mode: ENFORCING
          header: x-api-key
          admin_api_url: 'https://auth.don.apps.digilab.network/admin/realms/don/clients/'
          scope_required:
            - 'apis:read'
    put:
      security:
        - clientCredentials:
            - write
      summary: Specifieke API updaten
      operationId: updateApi
      tags:
        - Private endpoints
      description: Specifieke API updaten
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiPost'
      responses:
        '201':
          description: Created
          headers:
            API-Version:
              description: De API-versie van de response
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSummary'
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
      x-adc-status: 1
      x-adc-uri: '/apis/{id}'
      x-adc-upstream:
        scheme: http
        nodes:
          'don-api-api-register-svc:1337': 1
        hash_on: vars
        type: roundrobin
        pass_host: pass
      x-adc-plugins:
        rate-limit-by-keycloak-attribute:
          client_secret: C7dZAGOU5ExAK4ixo7bSr5nQksbCP4xP
          client_id: don-admin-client
          cache_ttl: 300
          admin_api_url: 'https://auth.don.apps.digilab.network/admin/realms/don/clients/'
          token_url: >-
            https://auth.don.apps.digilab.network/realms/don/protocol/openid-connect/token
        proxy-rewrite:
          regex_uri:
            - ^/(.*)
            - /$1
          use_real_request_uri_unsafe: false
        cors:

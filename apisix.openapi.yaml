          allow_headers: 'Authorization,x-api-key,Content-Type'
          allow_methods: '*'
          max_age: 5
        keycloak-api-key-auth:
          token_url: >-
            https://auth.don.apps.digilab.network/realms/don/protocol/openid-connect/token
          client_secret: C7dZAGOU5ExAK4ixo7bSr5nQksbCP4xP
          client_id: don-admin-client
          cache_ttl: 120
          policy_enforcement_mode: ENFORCING
          header: x-api-key
          admin_api_url: 'https://auth.don.apps.digilab.network/admin/realms/don/clients/'
          scope_required:
            - 'apis:write'
  /organisations:
    get:
      security:
        - apiKey: []
        - clientCredentials:
            - 'organisations:read'
      summary: Alle organisaties ophalen
      operationId: listOrganisations
      tags:
        - Publieke endpoints
      description: Alle organisaties ophalen
      responses:
        '200':
          description: OK
          headers:
            API-Version:
              $ref: '#/components/headers/API-Version'
          content:
            application/json:
              schema:
                type: object
                properties:
                  organisations:
                    type: array
                    items:
                      $ref: '#/components/schemas/Organisation'
      x-adc-status: 1
      x-adc-uri: /organisations
      x-adc-upstream:
        scheme: http
        nodes:
          'don-api-api-register-svc:1337': 1
        hash_on: vars
        type: roundrobin
        pass_host: pass
      x-adc-plugins:
        rate-limit-by-keycloak-attribute:
          client_secret: C7dZAGOU5ExAK4ixo7bSr5nQksbCP4xP
          client_id: don-admin-client
          cache_ttl: 300
          admin_api_url: 'https://auth.don.apps.digilab.network/admin/realms/don/clients/'
          token_url: >-
            https://auth.don.apps.digilab.network/realms/don/protocol/openid-connect/token
        proxy-rewrite:
          regex_uri:
            - ^/(.*)
            - /$1
          use_real_request_uri_unsafe: false
        cors:
          allow_origins: '*'
          allow_credential: false
          allow_headers: 'Authorization,x-api-key,Content-Type'
          allow_methods: '*'
          max_age: 5
        keycloak-api-key-auth:
          token_url: >-
            https://auth.don.apps.digilab.network/realms/don/protocol/openid-connect/token
          client_secret: C7dZAGOU5ExAK4ixo7bSr5nQksbCP4xP
          client_id: don-admin-client
          cache_ttl: 120
          policy_enforcement_mode: ENFORCING
          header: x-api-key
          admin_api_url: 'https://auth.don.apps.digilab.network/admin/realms/don/clients/'
          scope_required:
            - 'organisations:read'
components:
  schemas:
    Contact:
      required:
        - email
        - name
        - url
      type: object
      properties:
        email:
          type: string
          format: email
          example: developer.overheid@geonovum.nl
        name:
          type: string
          example: Team developer.overheid.nl
        url:
          type: string
          format: uri
          example: 'https://github.com/developer-overheid-nl/don-api-register/issues'
    ApiDetail:
      allOf:
        - $ref: '#/components/schemas/ApiSummary'
        - type: object
          properties:
            auth:
              nullable: true
              type: array
              items:
                type: string
                example: oauth2
            description:
              type: string
            docsUri:
              type: string
              format: uri
              example: >-
                https://apis.developer.overheid.nl/apis/3fa85f64-5717-4562-b3fc-2c963f66afa6
            servers:
              type: array
              items:
                $ref: '#/components/schemas/Server'
    ApiSummary:
      required:
        - contact
        - title
        - organisation
        - adrScore
      allOf:
        - $ref: '#/components/schemas/ApiPost'
        - type: object
          properties:
            title:
              type: string
              example: API register API v1
            description:
              type: string
              example: API van het API register (apis.developer.overheid.nl)
            organisation:
              $ref: '#/components/schemas/Organisation'
            adrScore:
              type: integer
              format: int32
              nullable: true
              default: null
            _links:
              type: object
              properties:
                self:
                  type: object
                  properties:
                    href:
                      type: string
                      format: uri
                      example: >-
                        https://api.developer.overheid.nl/v1/apis/3fa85f64-5717-4562-b3fc-2c963f66afa6
    Server:
      required:
        - url
        - description
      type: object
      properties:
        url:
          type: string
          format: uri
          example: 'https://api.developer.overheid.nl/v1'
        description:
          type: string
          example: Production
    ApiPost:
      type: object
      required:
        - id
        - oasUrl
        - organisationUri
      properties:
        id:
          type: string
          format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
          readOnly: true
        oasUrl:
          type: string
          format: uri
          example: 'https://api.developer.overheid.nl/api-register/v1/openapi.json'
        organisationUri:
          type: string
          format: uri
          example: 'https://identifier.overheid.nl/tooi/id/gemeente/gm0363'
          writeOnly: true
        contact:
          $ref: '#/components/schemas/Contact'
    Organisation:
      required:
        - label
        - uri
      type: object
      properties:
        label:
          type: string
          example: Binnenlandse Zaken en Koninkrijksrelaties (BZK)
        uri:
          type: string
          format: uri
          example: 'https://identifier.overheid.nl/tooi/id/ministerie/mnre1034'
  responses:
    '400':
      $ref: 'https://static.developer.overheid.nl/adr/components.yaml#/responses/400'
    '404':
      $ref: 'https://static.developer.overheid.nl/adr/components.yaml#/responses/404'
  headers:
    API-Version:
      description: De API-versie van de response
      schema:
        type: string
        example: 1.0.0
  securitySchemes:
    apiKey:
      type: apiKey
      name: X-Api-Key
      in: header
    clientCredentials:
      type: oauth2
      flows:
        clientCredentials:
          scopes:
            'apis:read': Leestoegang op API's
            'apis:write': Schrijftoegang op API's
            'organisations:read': Leestoegang op organisaties
          tokenUrl: >-
            https://auth.developer.overheid.nl/realms/don/protocol/openid-connect/token
          refreshUrl: >-
            https://auth.developer.overheid.nl/realms/don/protocol/openid-connect/refresh
security:
  - clientCredentials: []
tags:
  - name: Publieke endpoints
    description: >-
      Publieke endpoints van het API-register, te benaderen met een API-key of
      client credentials token.
  - name: Private endpoints
    description: >-
      Private endpoints van het API-register, te benaderen met een client
      credentials token.


      x-adc-status: 1
      x-adc-uri: /v1/lint
      x-adc-upstream:
        scheme: http
        nodes:
          '${endpoint:port}': 1
        hash_on: vars
        type: roundrobin
        pass_host: pass
      x-adc-plugins:
        rate-limit-by-keycloak-attribute:
          client_secret: C7dZAGOU5ExAK4ixo7bSr5nQksbCP4xP
          client_id: don-admin-client
          cache_ttl: 300
          admin_api_url: 'https://auth.don.apps.digilab.network/admin/realms/don/clients/'
          token_url: >-

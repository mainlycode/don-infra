components:
  schemas:
    ConvertOpenAPIToBrunoPostInput:
      type: object
      properties:
        '':
          type: array
          items:
            type: integer
            format: int32
        oas:
          type: array
          items:
            type: integer
            format: int32
    ConvertOpenAPIToPostmanPostInput:
      type: object
      properties:
        '':
          type: array
          items:
            type: integer
            format: int32
        oas:
          type: array
          items:
            type: integer
            format: int32
    LintOpenAPIPostInput:
      type: object
      properties:
        '':
          type: array
          items:
            type: integer
            format: int32
        oas:
          type: array
          items:
            type: integer
            format: int32
    ModelsLintMessage:
      type: object
      properties:
        code:
          type: string
        createdAt:
          type: string
          format: date-time
        id:
          type: string
        infos:
          type: array
          items:
            $ref: '#/components/schemas/ModelsLintMessageInfo'
        severity:
          type: string
    ModelsLintMessageInfo:
      type: object
      properties:
        id:
          type: string
        lintMessageId:
          type: string
        message:
          type: string
        path:
          type: string
    ModelsLintResult:
      type: object
      properties:
        apiId:
          type: string
        createdAt:
          type: string
          format: date-time
        failures:
          type: integer
          format: int32
        id:
          type: string
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ModelsLintMessage'
        score:
          type: integer
          format: int32
        successes:
          type: boolean
        warnings:
          type: integer
          format: int32
  responses:
    '404':
      $ref: 'https://static.developer.overheid.nl/adr/components.yaml#/responses/404'
  headers:
    API-Version:
      description: De API-versie van de response
      schema:
        type: string
        example: 1.0.0


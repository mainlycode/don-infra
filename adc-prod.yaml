services:
  - name: Tools API v1
    description: API van het Tools (apis.developer.overheid.nl)
    routes:
      - name: convertOpenAPIToBrunoPost
        description: Maak Bruno-collectie (POST)
        methods:
          - POST
        uris:
          - /tools/v1/bruno/convert
        plugins:
          proxy-rewrite:
            regex_uri:
              - ^/tools/(.*)
              - /$1
            use_real_request_uri_unsafe: false
          cors:
            allow_origins: "*"
            allow_credential: false
            allow_headers: Authorization,x-api-key,Content-Type
            allow_methods: "*"
            max_age: 5
          keycloak-api-key-auth:
            token_url: https://auth.developer.overheid.nl/realms/don/protocol/openid-connect/token
            client_secret: 2agqE2zbHUEm4oheKU8HtQS5aXOQbQDm
            client_id: don-admin-client
            cache_ttl: 120
            policy_enforcement_mode: ENFORCING
            header: x-api-key
            admin_api_url: https://auth.developer.overheid.nl/admin/realms/don/clients/
            scope_required:
              - tools
      - name: validatorOpenAPIPost
        description: Lint OpenAPI (POST)
        methods:
          - POST
        uris:
          - /tools/v1/oas/validate
        plugins:
          proxy-rewrite:
            regex_uri:
              - ^/tools/(.*)
              - /$1
            use_real_request_uri_unsafe: false
          cors:
            allow_origins: "*"
            allow_credential: false
            allow_headers: Authorization,x-api-key,Content-Type
            allow_methods: "*"
            max_age: 5
          keycloak-api-key-auth:
            token_url: https://auth.developer.overheid.nl/realms/don/protocol/openid-connect/token
            client_secret: 2agqE2zbHUEm4oheKU8HtQS5aXOQbQDm
            client_id: don-admin-client
            cache_ttl: 120
            policy_enforcement_mode: ENFORCING
            header: x-api-key
            admin_api_url: https://auth.developer.overheid.nl/admin/realms/don/clients/
            scope_required:
              - tools
      - name: Dereference OAS
        description: Dereference OpenAPI.
        methods:
          - POST
        uris:
          - /tools/v1/oas/dereference
        plugins:
          proxy-rewrite:
            regex_uri:
              - ^/tools/(.*)
              - /$1
            use_real_request_uri_unsafe: false
          cors:
            allow_origins: "*"
            allow_credential: false
            allow_headers: Authorization,x-api-key,Content-Type
            allow_methods: "*"
            max_age: 5
          keycloak-api-key-auth:
            token_url: https://auth.developer.overheid.nl/realms/don/protocol/openid-connect/token
            client_secret: 2agqE2zbHUEm4oheKU8HtQS5aXOQbQDm
            client_id: don-admin-client
            cache_ttl: 120
            policy_enforcement_mode: ENFORCING
            header: x-api-key
            admin_api_url: https://auth.developer.overheid.nl/admin/realms/don/clients/
            scope_required:
              - tools
      - name: createAuthClient
        description: Maak een nieuwe Auth Client aan (POST)
        methods:
          - POST
        uris:
          - /tools/v1/auth/clients
        plugins:
          proxy-rewrite:
            regex_uri:
              - ^/tools/(.*)
              - /$1
            use_real_request_uri_unsafe: false
          cors:
            allow_origins: "*"
            allow_credential: false
            allow_headers: Authorization,x-api-key,Content-Type
            allow_methods: "*"
            max_age: 5
          keycloak-api-key-auth:
            token_url: https://auth.developer.overheid.nl/realms/don/protocol/openid-connect/token
            client_secret: 2agqE2zbHUEm4oheKU8HtQS5aXOQbQDm
            client_id: don-admin-client
            cache_ttl: 120
            policy_enforcement_mode: ENFORCING
            header: x-api-key
            admin_api_url: https://auth.developer.overheid.nl/admin/realms/don/clients/
            scope_required:
              - tools
      - name: ConvertOAS
        description: Converteer OpenAPI 3.0/3.1
        methods:
          - POST
        uris:
          - /tools/v1/oas/convert
        plugins:
          proxy-rewrite:
            regex_uri:
              - ^/tools/(.*)
              - /$1
            use_real_request_uri_unsafe: false
          cors:
            allow_origins: "*"
            allow_credential: false
            allow_headers: Authorization,x-api-key,Content-Type
            allow_methods: "*"
            max_age: 5
          keycloak-api-key-auth:
            token_url: https://auth.developer.overheid.nl/realms/don/protocol/openid-connect/token
            client_secret: 2agqE2zbHUEm4oheKU8HtQS5aXOQbQDm
            client_id: don-admin-client
            cache_ttl: 120
            policy_enforcement_mode: ENFORCING
            header: x-api-key
            admin_api_url: https://auth.developer.overheid.nl/admin/realms/don/clients/
            scope_required:
              - tools
      - name: convertOpenAPIToPostmanPost
        description: Maak Postman-collectie (POST)
        methods:
          - POST
        uris:
          - /tools/v1/postman/convert
        plugins:
          proxy-rewrite:
            regex_uri:
              - ^/tools/(.*)
              - /$1
            use_real_request_uri_unsafe: false
          cors:
            allow_origins: "*"
            allow_credential: false
            allow_headers: Authorization,x-api-key,Content-Type
            allow_methods: "*"
            max_age: 5
          keycloak-api-key-auth:
            token_url: https://auth.developer.overheid.nl/realms/don/protocol/openid-connect/token
            client_secret: 2agqE2zbHUEm4oheKU8HtQS5aXOQbQDm
            client_id: don-admin-client
            cache_ttl: 120
            policy_enforcement_mode: ENFORCING
            header: x-api-key
            admin_api_url: https://auth.developer.overheid.nl/admin/realms/don/clients/
            scope_required:
              - tools
      - name: arazzo
        description: Converteert een OpenAPI Arazzo specificatie naar Markdown en Mermaid. Body { arazzoUrl|arazzoBody, output? } waarbij output optioneel is en 'markdown', 'mermaid' of 'both' kan zijn.
        methods:
          - POST
        uris:
          - /tools/v1/arazzo/parse
        plugins:
          proxy-rewrite:
            regex_uri:
              - ^/tools/(.*)
              - /$1
            use_real_request_uri_unsafe: false
          cors:
            allow_origins: "*"
            allow_credential: false
            allow_headers: Authorization,x-api-key,Content-Type
            allow_methods: "*"
            max_age: 5
          keycloak-api-key-auth:
            token_url: https://auth.developer.overheid.nl/realms/don/protocol/openid-connect/token
            client_secret: 2agqE2zbHUEm4oheKU8HtQS5aXOQbQDm
            client_id: don-admin-client
            cache_ttl: 120
            policy_enforcement_mode: ENFORCING
            header: x-api-key
            admin_api_url: https://auth.developer.overheid.nl/admin/realms/don/clients/
            scope_required:
              - tools
      - name: ConvertOAS
        description: Zet OpenAPI 3.0 om naar 3.1 of andersom. Body { oasUrl } of { oasBody }.
        methods:
          - POST
        uris:
          - /tools/v1/oas/convert
        plugins:
          proxy-rewrite:
            regex_uri:
              - ^/tools/(.*)
              - /$1
            use_real_request_uri_unsafe: false
          cors:
            allow_origins: "*"
            allow_credential: false
            allow_headers: Authorization,x-api-key,Content-Type
            allow_methods: "*"
            max_age: 5
          keycloak-api-key-auth:
            token_url: https://auth.developer.overheid.nl/realms/don/protocol/openid-connect/token
            client_secret: 2agqE2zbHUEm4oheKU8HtQS5aXOQbQDm
            client_id: don-admin-client
            cache_ttl: 120
            policy_enforcement_mode: ENFORCING
            header: x-api-key
            admin_api_url: https://auth.developer.overheid.nl/admin/realms/don/clients/
            scope_required:
              - tools
      - name: openapiSpec
        description: OpenAPI-specificatie ophalen
        methods:
          - GET
        uris:
          - /tools/v1/openapi.json
        plugins:
          proxy-rewrite:
            regex_uri:
              - ^/tools/(.*)
              - /$1
            use_real_request_uri_unsafe: false
          cors:
            allow_origins: "*"
            allow_credential: false
            allow_headers: Authorization,x-api-key,Content-Type
            allow_methods: "*"
            max_age: 5
    upstream:
      scheme: http
      nodes:
        - host: don-api-tools-svc
          port: 1338
          weight: 100
      timeout:
        connect: 60
        send: 60
        read: 60
      pass_host: pass

overlay: 1.0.0
info:
  title: APISIX overlay met security scopes
  version: 0.2.0
actions:
  - target: $.paths["/apis"].get
    update:
      x-adc-status: 1
      x-adc-uri: /apis
      x-adc-upstream:
        scheme: http
        nodes:
          ${endpoint:port}: 1
        hash_on: vars
        type: roundrobin
        pass_host: pass
      x-adc-plugins:
        rate-limit-by-keycloak-attribute:
          client_secret: ${client_secret}
          client_id: ${client_id}
          cache_ttl: 300
          admin_api_url: ${keycloak_url}/admin/realms/${realm_name}/clients/
          token_url: ${keycloak_url}/realms/${realm_name}/protocol/openid-connect/token
        proxy-rewrite:
          regex_uri:
            - ^/(.*)
            - /$1
          use_real_request_uri_unsafe: false
        cors:
          allow_origins: '*'
          allow_credential: false
          allow_headers: Authorization,x-api-key,Content-Type
          allow_methods: '*'
          max_age: 5
        keycloak-api-key-auth:
          token_url: ${keycloak_url}/realms/${realm_name}/protocol/openid-connect/token
          client_secret: ${client_secret}
          client_id: ${client_id}
          cache_ttl: 120
          policy_enforcement_mode: ENFORCING
          header: x-api-key
          admin_api_url: ${keycloak_url}/admin/realms/${realm_name}/clients/
          scope_required:
            - apis:read
